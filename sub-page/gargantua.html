<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Gargantua · Buraco Negro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; }
        canvas { display: block; }

        #ui {
            position: fixed; inset: 0; pointer-events: none;
            font-family: 'Courier New', monospace;
        }

        /* ── TITLE ── */
        #title { position: absolute; top: 32px; left: 40px; }
        #title h1 {
            font-size: 34px; font-weight: 300; letter-spacing: 10px;
            color: #ff9940;
            text-shadow: 0 0 20px rgba(255,150,50,.8), 0 0 60px rgba(255,80,0,.35);
        }
        #title .sub {
            font-size: 10px; letter-spacing: 4px; color: #555; margin-top: 8px;
        }

        /* ── TELEMETRY ── */
        #telem {
            position: absolute; bottom: 32px; left: 40px;
            font-size: 10px; letter-spacing: 2px; color: #3a3a3a; line-height: 2.2;
        }
        #telem .label { color: #3a3a3a; }
        #telem .val   { color: #666; }
        .blue  { color: #5599ff; }
        .red   { color: #ff5533; }

        /* ── CONTROLS ── */
        #ctrl {
            position: absolute; bottom: 32px; right: 40px;
            font-size: 10px; letter-spacing: 2px; color: #2e2e2e;
            text-align: right; line-height: 2.4;
        }

        /* ── SCAN LINE ── */
        #ui::after {
            content: '';
            position: absolute; inset: 0;
            background: repeating-linear-gradient(
                0deg, transparent, transparent 2px,
                rgba(0,0,0,.03) 2px, rgba(0,0,0,.03) 4px
            );
            pointer-events: none;
        }
    </style>

    <script type="importmap">{
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }</script>
</head>
<body>
<div id="ui">
    <div id="title">
        <h1>GARGANTUA</h1>
        <div class="sub">SIMULADOR DE BURACO NEGRO · EFEITOS RELATIVÍSTICOS</div>
    </div>
    <div id="telem">
        <div><span class="label">MASSA</span> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="val">6.5 × 10⁹ M☉</span></div>
        <div><span class="label">RAIO SCHWARZSCHILD</span> &nbsp;<span class="val">≈ 19.5 AU</span></div>
        <div><span class="label">ESFERA DE FÓTONS</span> &nbsp;&nbsp;&nbsp;<span class="val">r = 1.5 rₛ</span></div>
        <div><span class="label">DESVIO DOPPLER</span> &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="blue">■</span><span class="val"> azul</span> &ensp; <span class="red">■</span><span class="val"> vermelho</span></div>
    </div>
    <div id="ctrl">
        <div>ARRASTAR → ORBITAR</div>
        <div>SCROLL → ZOOM</div>
        <div>DUPLO CLIQUE → RESET</div>
    </div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls }  from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }     from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass }from 'three/addons/postprocessing/UnrealBloomPass.js';

// ──────────────────────────────────────────────────────────────────────────────
//  CORE SETUP
// ──────────────────────────────────────────────────────────────────────────────
const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 2000);
camera.position.set(0, 5, 22);

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.04;
controls.maxDistance = 65;
controls.minDistance = 5.5;

renderer.domElement.addEventListener('dblclick', () => {
    camera.position.set(0, 5, 22);
    controls.reset();
});

// ──────────────────────────────────────────────────────────────────────────────
//  POST-PROCESSING
// ──────────────────────────────────────────────────────────────────────────────
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(
    new THREE.Vector2(innerWidth, innerHeight),
    1.9,   // strength
    0.55,  // radius
    0.06   // threshold (low = more things glow)
);
composer.addPass(bloom);

// ──────────────────────────────────────────────────────────────────────────────
//  STAR FIELD
// ──────────────────────────────────────────────────────────────────────────────
{
    const N = 16000;
    const pos = new Float32Array(N * 3);
    const col = new Float32Array(N * 3);
    for (let i = 0; i < N; i++) {
        const theta = Math.random() * Math.PI * 2;
        const phi   = Math.acos(2 * Math.random() - 1);
        const r     = 300 + Math.random() * 250;
        pos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
        pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
        pos[i*3+2] = r * Math.cos(phi);

        // Blue giants, orange dwarfs, white main-sequence
        const rnd = Math.random();
        if      (rnd < 0.08) { col[i*3]=.55; col[i*3+1]=.72; col[i*3+2]=1.00; }
        else if (rnd < 0.13) { col[i*3]=1.00; col[i*3+1]=.62; col[i*3+2]=.28; }
        else                 { col[i*3]=.95;  col[i*3+1]=.95; col[i*3+2]=1.00; }
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));
    scene.add(new THREE.Points(geo, new THREE.PointsMaterial({
        size: 0.20, vertexColors: true, transparent: true, opacity: 0.88
    })));
}

// ──────────────────────────────────────────────────────────────────────────────
//  BLACK HOLE — EVENT HORIZON (opaque occluder)
// ──────────────────────────────────────────────────────────────────────────────
scene.add(new THREE.Mesh(
    new THREE.SphereGeometry(3, 64, 64),
    new THREE.MeshBasicMaterial({ color: 0x000000 })
));

// ──────────────────────────────────────────────────────────────────────────────
//  CORONA — rim glow around the event horizon (BackSide sphere trick)
// ──────────────────────────────────────────────────────────────────────────────
const coronaMat = new THREE.ShaderMaterial({
    uniforms: { time: { value: 0.0 } },
    vertexShader: `
        varying float vRim;
        void main() {
            vec4 mv  = modelViewMatrix * vec4(position, 1.0);
            vec3 vn  = normalize(normalMatrix * normal);
            vec3 vd  = normalize(-mv.xyz);
            vRim     = pow(1.0 - abs(dot(vn, vd)), 2.8);
            gl_Position = projectionMatrix * mv;
        }
    `,
    fragmentShader: `
        uniform float time;
        varying float vRim;
        void main() {
            float flicker = 0.82 + 0.18 * sin(time * 5.3);
            vec3  color   = mix(vec3(1.0, 0.45, 0.05), vec3(1.0, 0.9, 0.6), vRim * 0.6);
            gl_FragColor  = vec4(color, vRim * 0.6 * flicker);
        }
    `,
    transparent: true, side: THREE.BackSide,
    blending: THREE.AdditiveBlending, depthWrite: false
});
scene.add(new THREE.Mesh(new THREE.SphereGeometry(3.9, 32, 32), coronaMat));

// ──────────────────────────────────────────────────────────────────────────────
//  ACCRETION DISK — GPU shader with Keplerian orbits + relativistic Doppler
// ──────────────────────────────────────────────────────────────────────────────
const DISK_VERT = /* glsl */`
    uniform float time;
    uniform vec3  camPos;

    attribute float initAngle;  // starting orbital angle
    attribute float radius;     // orbital radius (fixed, conserves AM)
    attribute float vertOff;    // vertical displacement
    attribute vec3  baseCol;    // initial plasma colour

    varying vec3  vCol;
    varying float vAlpha;

    void main() {
        // Keplerian angular velocity: ω ∝ r^{-3/2}
        // Normalised so r = 3.5 → ω = 0.9 rad/s
        float omega = 0.9 / pow(radius / 3.5, 1.5);
        float angle = initAngle + omega * time;

        // World-space position of this particle
        vec3 pos = vec3(cos(angle) * radius, vertOff, sin(angle) * radius);

        // ── Relativistic Doppler ──────────────────────────────────────────
        // Unit tangent in the direction of motion
        vec3 tang   = vec3(-sin(angle), 0.0, cos(angle));
        vec3 toCam  = normalize(camPos - pos);
        // Normalised radial-velocity component (-1 receding, +1 approaching)
        float shift = clamp(dot(tang, toCam), -1.0, 1.0);

        vec3 col = baseCol;
        if (shift > 0.0)
            col = mix(col, vec3(0.50, 0.75, 1.00), shift * 0.82); // blueshift
        else
            col = mix(col, vec3(1.00, 0.08, 0.00), -shift * 0.82); // redshift

        // Temperature gradient: whiter and brighter near the ISCO
        float heat = 1.0 - (radius - 3.2) / 9.3;
        col = mix(col, vec3(1.6, 1.25, 0.95), heat * 0.55);

        vCol   = col;
        vAlpha = 0.60 + heat * 0.40;

        // ── Projection ───────────────────────────────────────────────────
        vec4 mv = modelViewMatrix * vec4(pos, 1.0);
        gl_Position  = projectionMatrix * mv;
        // Point size with perspective: hotter particles are larger
        gl_PointSize = (1.6 + heat * 2.8) * (330.0 / -mv.z);
    }
`;

const DISK_FRAG = /* glsl */`
    varying vec3  vCol;
    varying float vAlpha;

    void main() {
        float d = length(gl_PointCoord - 0.5);
        if (d > 0.5) discard;
        float alpha = (0.5 - d) * 2.0 * vAlpha;
        gl_FragColor = vec4(vCol, alpha);
    }
`;

function makeDisk(count, rMin, rMax, vSpread) {
    const angles  = new Float32Array(count);
    const radii   = new Float32Array(count);
    const voffs   = new Float32Array(count);
    const bcols   = new Float32Array(count * 3);
    const initPos = new Float32Array(count * 3); // for Three.js bounding sphere

    for (let i = 0; i < count; i++) {
        const a    = Math.random() * Math.PI * 2;
        const r    = rMin + Math.pow(Math.random(), 1.5) * (rMax - rMin);
        const heat = 1 - (r - rMin) / (rMax - rMin);
        const v    = (Math.random() - 0.5) * vSpread * (0.15 + heat * 0.85);

        angles[i] = a;
        radii[i]  = r;
        voffs[i]  = v;

        // Plasma colour: hue drifts from orange → yellow
        const c = new THREE.Color().setHSL(0.04 + Math.random() * 0.09, 1.0, 0.42 + heat * 0.32);
        bcols[i*3] = c.r; bcols[i*3+1] = c.g; bcols[i*3+2] = c.b;

        // Initial world-space position (for frustum culling bounding box)
        initPos[i*3]   = Math.cos(a) * r;
        initPos[i*3+1] = v;
        initPos[i*3+2] = Math.sin(a) * r;
    }

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position',  new THREE.BufferAttribute(initPos, 3));
    geo.setAttribute('initAngle', new THREE.BufferAttribute(angles, 1));
    geo.setAttribute('radius',    new THREE.BufferAttribute(radii, 1));
    geo.setAttribute('vertOff',   new THREE.BufferAttribute(voffs, 1));
    geo.setAttribute('baseCol',   new THREE.BufferAttribute(bcols, 3));

    const mat = new THREE.ShaderMaterial({
        uniforms: {
            time:   { value: 0.0 },
            camPos: { value: new THREE.Vector3() }
        },
        vertexShader: DISK_VERT,
        fragmentShader: DISK_FRAG,
        transparent: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false
    });

    const pts = new THREE.Points(geo, mat);
    // Particles orbit at fixed radii so the initial bounding sphere is always valid
    geo.computeBoundingSphere();
    return pts;
}

const disk = makeDisk(80000, 3.2, 12.5, 1.0);
scene.add(disk);

// ──────────────────────────────────────────────────────────────────────────────
//  PHOTON SPHERE — two concentric glowing rings at r ≈ 1.5 rₛ
// ──────────────────────────────────────────────────────────────────────────────
for (const [r, tube, col] of [
    [4.50, 0.048, 0xfffbee],   // outer photon ring
    [3.48, 0.026, 0xffeedd],   // inner "shadow ring"
]) {
    const ring = new THREE.Mesh(
        new THREE.TorusGeometry(r, tube, 8, 280),
        new THREE.MeshBasicMaterial({ color: col })
    );
    ring.rotation.x = Math.PI / 2;
    scene.add(ring);
}

// ──────────────────────────────────────────────────────────────────────────────
//  GRAVITATIONAL LENSING ARCS
//  Approximate the far-side disk image that bends OVER the black hole
// ──────────────────────────────────────────────────────────────────────────────
for (const [r, tube, arc, ry, opacity] of [
    [4.62, 0.090, Math.PI * 1.25, 0.00,        0.22],
    [4.62, 0.070, Math.PI * 1.20, Math.PI,     0.17],
    [4.80, 0.040, Math.PI * 0.85, Math.PI*0.5, 0.10],
    [5.00, 0.030, Math.PI * 0.70, Math.PI*1.5, 0.07],
]) {
    const mesh = new THREE.Mesh(
        new THREE.TorusGeometry(r, tube, 8, 120, arc),
        new THREE.MeshBasicMaterial({
            color: 0xff7722, transparent: true, opacity,
            side: THREE.DoubleSide,
            blending: THREE.AdditiveBlending, depthWrite: false
        })
    );
    mesh.rotation.y = ry;
    mesh.rotation.z = Math.PI / 2;
    scene.add(mesh);
}

// ──────────────────────────────────────────────────────────────────────────────
//  RELATIVISTIC JETS — polar plasma beams
// ──────────────────────────────────────────────────────────────────────────────
function makeJet(dir) {
    const N   = 10000;
    const pos = new Float32Array(N * 3);
    const col = new Float32Array(N * 3);
    for (let i = 0; i < N; i++) {
        const t   = Math.pow(Math.random(), 0.55);
        const h   = dir * (3.3 + t * 30);
        const spr = (1 - t * 0.92) * 0.75;
        const ang = Math.random() * Math.PI * 2;
        const rr  = Math.random() * spr;
        pos[i*3]   = Math.cos(ang) * rr;
        pos[i*3+1] = h;
        pos[i*3+2] = Math.sin(ang) * rr;
        const bright = 1 - t * 0.78;
        col[i*3]   = 0.22 * bright;
        col[i*3+1] = 0.55 * bright;
        col[i*3+2] = bright;
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));
    return new THREE.Points(geo, new THREE.PointsMaterial({
        size: 0.07, vertexColors: true, transparent: true, opacity: 0.55,
        blending: THREE.AdditiveBlending, depthWrite: false
    }));
}
scene.add(makeJet(+1));
scene.add(makeJet(-1));

// ──────────────────────────────────────────────────────────────────────────────
//  OUTER DUST / GAS HALO
// ──────────────────────────────────────────────────────────────────────────────
{
    const N   = 5000;
    const pos = new Float32Array(N * 3);
    const col = new Float32Array(N * 3);
    for (let i = 0; i < N; i++) {
        const r = 15 + Math.random() * 24;
        const t = Math.random() * Math.PI * 2;
        const p = (Math.random() - 0.5) * Math.PI * 0.22;
        pos[i*3]   = r * Math.cos(t) * Math.cos(p);
        pos[i*3+1] = r * Math.sin(p);
        pos[i*3+2] = r * Math.sin(t) * Math.cos(p);
        col[i*3]   = 0.30 + Math.random() * 0.15;
        col[i*3+1] = 0.10 + Math.random() * 0.06;
        col[i*3+2] = 0.00;
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));
    scene.add(new THREE.Points(geo, new THREE.PointsMaterial({
        size: 0.38, vertexColors: true, transparent: true, opacity: 0.11,
        blending: THREE.AdditiveBlending, depthWrite: false
    })));
}

// ──────────────────────────────────────────────────────────────────────────────
//  ANIMATION LOOP
// ──────────────────────────────────────────────────────────────────────────────
const clock = new THREE.Clock();

(function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();

    disk.material.uniforms.time.value   = t;
    disk.material.uniforms.camPos.value.copy(camera.position);
    coronaMat.uniforms.time.value       = t;

    controls.update();
    composer.render();
})();

// ──────────────────────────────────────────────────────────────────────────────
//  RESIZE
// ──────────────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
    composer.setSize(innerWidth, innerHeight);
    bloom.resolution.set(innerWidth, innerHeight);
});
</script>
</body>
</html>
